

server:
  grpc_port: 9090          
  ws_port: 8081            

exchange:
  # WSL2 IP — if this stops working run: wsl hostname -I  and update this line
  ws_url: "ws://localhost:8080/ws/market-data"
  reconnect_delay_s: 1.0
  max_reconnect_delay_s: 30.0

storage:
  output_dir: "data/ticks"   
  buffer_size: 10000         
  flush_interval_s: 5.0      
  max_file_ticks: 500000     



symbol_map:
  0: "AAPL"
  1: "MSFT"
  2: "TSLA"
  3: "NVDA"

logging:
  level: "info"    
  format: "json"  
